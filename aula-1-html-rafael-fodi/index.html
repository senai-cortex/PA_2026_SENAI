<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Personagem</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="message" id="message">
        <span id="messageEmoji">🎉</span>
        <div id="messageText">OI!</div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="glow"></div>
            <h1 id="title">Olá!</h1>
            <div class="image-container" id="monkeContainer">
                <img src="assets/unnamed.webp" alt="Personagem" id="monke">
            </div>
            <p class="subtitle" id="subtitle">Clique na imagem!</p>
            <p class="click-hint">👆 Clique na imagem!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
